name: Validate Data

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate JSON datasets
        run: python scripts/validate_data.py
      - name: Build CSV exports
        run: python scripts/export_csv.py

