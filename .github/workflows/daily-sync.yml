name: Daily Sync

on:
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install google-genai pydantic

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Sync Snapshot proposals (no votes for speed)
        run: python scripts/sync_snapshot.py --no-votes

      - name: Full pipeline
        run: python scripts/refresh_all.py --incremental

      - name: Export analytics bundle
        run: python scripts/export.py

      - name: Build Pages site
        run: python scripts/build_site.py

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build Vercel frontend
        run: npm run build
        working-directory: web

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data exports raw docs scripts .github README.md config web
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily gnars data sync"
          git push origin HEAD:main
