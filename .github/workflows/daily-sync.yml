name: Daily Sync

on:
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install google-genai pydantic

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Sync Gnars web sources
        run: python scripts/sync_gnars.py

      - name: Sync proposal archive
        run: python scripts/sync_proposals.py

      - name: Sync treasury
        run: python scripts/sync_treasury.py

      - name: Ingestion orchestrator
        run: python scripts/ingest.py --skip-gnars --skip-proposals --skip-treasury

      - name: Seed pilot tagging queue
        run: python scripts/tag_proposals.py --init-pilot 30 --scope pilot-30

      - name: Derive analytics datasets
        run: python scripts/derive_analytics.py

      - name: Transform layered analytics
        run: python scripts/transform.py

      - name: Phase 0 - Audit gaps
        run: python scripts/audit_gaps.py

      - name: Phase 1 - Enrich members
        run: python scripts/enrich_members.py

      - name: Phase 2 - Classify proposals (Gemini incremental)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY not set. Skipping proposal classification."
          else
            python scripts/agent_classify.py
          fi

      - name: Phase 3 - Enrich spend ledger
        run: python scripts/enrich_spend.py

      - name: Phase 4 - Derive analytics datasets
        run: python scripts/derive_analytics.py

      - name: Validate datasets
        run: python scripts/validate_data.py

      - name: Build CSV exports
        run: python scripts/export_csv.py

      - name: Export analytics bundle
        run: python scripts/export.py

      - name: Build Pages site
        run: python scripts/build_site.py

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build Vercel frontend
        run: npm run build
        working-directory: web

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data exports raw docs scripts .github README.md config web
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily gnars data sync"
          git push origin HEAD:main
